name: Auto-Initialize Android Flutter Project

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  setup-android-structure:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - run: |
          flutter create . \
            --overwrite \
            --platforms=android \
            --org com.example \
            --project-name aman_ide

          mkdir -p lib/src/models lib/src/views lib/src/controllers lib/src/services

      - run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add .

          if git diff --staged --quiet; then
            echo "No new changes"
          else
            git commit -m "chore: setup project"
            git pull --rebase origin main || true
            git push origin HEAD:main
          fi
