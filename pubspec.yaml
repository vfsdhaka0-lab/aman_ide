name: aman_ide
description: A real mobile IDE for Flutter built by Aman
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # 📁 Storage & File System
  path_provider: ^2.1.2

  # 🔐 Permissions (for real storage access)
  permission_handler: ^11.3.0

  # 🎨 Icons (optional but useful)
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true